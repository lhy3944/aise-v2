services:
  postgres:
    image: postgres:16-alpine
    container_name: aise2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aise1234}
      POSTGRES_DB: ${POSTGRES_DB:-aise}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aise} -d ${POSTGRES_DB:-aise}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
