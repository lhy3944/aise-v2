services:
  postgres:
    image: postgres:16-alpine
    container_name: aise2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aise1234}
      POSTGRES_DB: ${POSTGRES_DB:-aise}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aise}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aise2_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aise}:${POSTGRES_PASSWORD:-aise1234}@postgres:5432/${POSTGRES_DB:-aise}
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      CORS_ORIGINS: "http://${HOST_IP:-localhost}:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aise2_frontend
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://${HOST_IP:-localhost}:8081"
    depends_on:
      - backend

volumes:
  postgres_data:
