name: Preview Deploy

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'claude/**'
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'references/**'

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            REPO_DIR="${{ secrets.VPS_REPO_DIR || '/home/workspace/aise-v2-preview' }}"
            BRANCH="${{ github.ref_name }}"

            echo "=== Deploying branch: $BRANCH ==="

            cd "$REPO_DIR"

            # Fetch and checkout branch
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            # Build and deploy with docker-compose
            docker compose -f docker-compose.yml -f docker-compose.preview.yml up -d --build

            echo "=== Deploy complete ==="
            echo "Frontend: http://$(hostname -I | awk '{print $1}'):4000"
            echo "Backend:  http://$(hostname -I | awk '{print $1}'):8081"
            echo "Swagger:  http://$(hostname -I | awk '{print $1}'):8081/docs"

  notify:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: always()
    steps:
      - name: Send Telegram notification (success)
        if: needs.deploy-preview.result == 'success'
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Preview 배포 완료*

            *브랜치:* `${{ github.ref_name }}`
            *커밋:* `${{ github.sha }}`
            *메시지:* ${{ github.event.head_commit.message }}

            🌐 *Frontend:* http://${{ secrets.VPS_HOST }}:4000
            📡 *Backend:* http://${{ secrets.VPS_HOST }}:8081
            📖 *Swagger:* http://${{ secrets.VPS_HOST }}:8081/docs

            [커밋 보기](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Send Telegram notification (failure)
        if: needs.deploy-preview.result == 'failure'
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Preview 배포 실패*

            *브랜치:* `${{ github.ref_name }}`
            *커밋:* `${{ github.sha }}`
            *메시지:* ${{ github.event.head_commit.message }}

            [로그 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
