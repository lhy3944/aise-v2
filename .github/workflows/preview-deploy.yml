name: Preview Deploy

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'claude/**'
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'references/**'

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            REPO_DIR="${{ secrets.VPS_REPO_DIR || '~/aise-v2' }}"
            BRANCH="${{ github.ref_name }}"

            echo "=== Deploying branch: $BRANCH ==="

            cd "$REPO_DIR"

            # Fetch and checkout branch
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            # Build and deploy with docker-compose
            docker compose -f docker-compose.yml -f docker-compose.preview.yml up -d --build

            echo "=== Deploy complete ==="
            echo "Frontend: http://$(hostname -I | awk '{print $1}'):4000"
            echo "Backend:  http://$(hostname -I | awk '{print $1}'):8081"
            echo "Swagger:  http://$(hostname -I | awk '{print $1}'):8081/docs"

  notify:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.deploy-preview.result }}" = "success" ]; then
            echo "✅ Preview deployed successfully"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
          else
            echo "❌ Preview deploy failed"
          fi
