# Preview 환경 (master와 포트/컨테이너 완전 분리)
# 사용: docker compose -f docker-compose.preview.yml up -d --build
#
# master 환경:  Frontend 4000, Backend 8081, DB 5432 (aise2_*)
# preview 환경: Frontend 4100, Backend 8181, DB 5433 (aise2_preview_*)

services:
  postgres:
    image: postgres:16-alpine
    container_name: aise2_preview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aise1234}
      POSTGRES_DB: ${POSTGRES_DB:-aise}
    ports:
      - "5433:5432"
    volumes:
      - preview_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aise}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aise2_preview_backend
    restart: unless-stopped
    ports:
      - "8181:8081"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aise}:${POSTGRES_PASSWORD:-aise1234}@postgres:5432/${POSTGRES_DB:-aise}
      ENVIRONMENT: preview
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://${HOST_IP:-localhost}:8181"
    container_name: aise2_preview_frontend
    restart: unless-stopped
    ports:
      - "4100:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://${HOST_IP:-localhost}:8181"
    depends_on:
      - backend

volumes:
  preview_postgres_data:
